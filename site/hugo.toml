baseURL = "https://kimmo.cloud/pintheft/"
locale = "en-US"
title = "PinTheft — RDS zerocopy double-free LPE"
copyright = "Copyright © 2026 [Kimmo Suominen](https://kimmo.suominen.com/) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

enableEmoji = true
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]   # no tags/categories in this site

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
  defaultTheme = "auto"        # honour prefers-color-scheme
  ShowReadingTime = false
  ShowShareButtons = false
  ShowBreadCrumbs = false
  ShowToc = true
  TocOpen = false
  UseHugoToc = true
  ShowCodeCopyButtons = true
  disableScrollToTop = false

[markup.goldmark.parser.attribute]
  block = true                 # allow `{.class}` on the line before a block

[markup.highlight]
  noClasses = false            # let PaperMod's chroma CSS theme code blocks

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false

[outputs]
  home = ["HTML", "RSS"]       # keep an RSS feed in case you add updates later
